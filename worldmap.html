<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Map Markup 在线地图标记</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #map { height: 100vh; width: 100vw; }

  .leaflet-tile { filter: grayscale(1) brightness(0.95) !important; }

  .country-label { background: none !important; border: none !important; box-shadow: none !important; }
  .country-label .leaflet-tooltip-content {
    color: #ccc; font-size: 11px; letter-spacing: 0.5px;
    background: rgba(26,26,26,0.85); padding: 4px 10px; border-radius: 3px; white-space: nowrap;
  }
  .country-label::before { display: none !important; }

  /* ─── control panel ─── */
  .panel {
    position: fixed; top: 20px; right: 20px;
    width: 230px; z-index: 1000;
    background: rgba(26,26,26,0.92); border: 1px solid #333; border-radius: 8px;
    padding: 14px 16px; backdrop-filter: blur(8px);
  }
  .panel h3 { color: #aaa; font-size: 10px; letter-spacing: 1px; margin-bottom: 6px; font-weight: 400; }

  .panel textarea {
    width: 100%; height: 64px;
    background: #222; border: 1px solid #3a3a3a; border-radius: 4px;
    color: #ddd; font-size: 12px; padding: 6px 8px; resize: vertical; outline: none;
  }
  .panel textarea:focus { border-color: #555; }

  /* ─── picker section label ─── */
  .picker-label { color: #666; font-size: 9px; letter-spacing: 0.5px; margin: 8px 0 4px; }

  /* ─── color swatches ─── */
  .color-row { display: flex; gap: 6px; align-items: center; }
  .swatch {
    width: 18px; height: 18px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent; transition: all .15s;
    flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); }

  /* ─── icon picker ─── */
  .icon-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .icon-opt {
    width: 26px; height: 26px; border-radius: 4px;
    cursor: pointer; border: 1.5px solid transparent; transition: all .15s;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; background: none;
  }
  .icon-opt:hover { background: #2a2a2a; }
  .icon-opt.active { border-color: #fff; background: #2a2a2a; }
  .icon-opt.dot-symbol {
    font-size: 12px; color: #ccc;
  }

  .panel .row { display: flex; gap: 8px; margin-top: 8px; }
  .panel .row2 { display: flex; gap: 8px; margin-top: 4px; }
  .panel button {
    flex: 1; padding: 6px 0; border: none; border-radius: 4px;
    font-size: 11px; cursor: pointer; transition: background .2s; letter-spacing: 0.5px;
  }
  .panel .btn-mark { background: #555; color: #fff; }
  .panel .btn-mark:hover { background: #666; }
  .panel .btn-clear { background: #333; color: #aaa; }
  .panel .btn-clear:hover { background: #444; color: #ddd; }

  .panel .status {
    font-size: 10px; margin-top: 5px; min-height: 14px;
  }
  .panel .status.ok    { color: #2ec4b6; }
  .panel .status.error { color: #e63946; }
  .panel .status.info  { color: #888; }

  .panel .hint { color: #555; font-size: 10px; margin-top: 6px; line-height: 1.5; }

  .panel .btn-reset { background: #2a2a2a; color: #777; font-size: 10px; padding: 6px 0; border: none; border-radius: 4px; cursor: pointer; transition: background .2s; letter-spacing: 0.5px; flex: 0.6; }
  .panel .btn-reset:hover { background: #3a3a3a; color: #aaa; }

  .watermark {
    position: fixed; bottom: 12px; right: 16px;
    color: #444; font-size: 10px; letter-spacing: 1px;
    z-index: 1000; pointer-events: none;
    text-align: right; line-height: 1.6;
  }
  .watermark .credit { color: #333; font-size: 9px; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <h3>标记地区</h3>
  <textarea id="input" placeholder="输入地区名，逗号/换行分隔&#10;例：泰国, 越南, 法国, 埃及, 巴西"></textarea>

  <div class="picker-label">颜色</div>
  <div class="color-row">
    <div class="swatch" data-color="#e63946" style="background:#e63946" title="红色"></div>
    <div class="swatch" data-color="#2ec4b6" style="background:#2ec4b6" title="青色"></div>
    <div class="swatch" data-color="#f4a261" style="background:#f4a261" title="琥珀"></div>
    <div class="swatch" data-color="#7b2cbf" style="background:#7b2cbf" title="紫色"></div>
    <div class="swatch" data-color="#2ecc71" style="background:#2ecc71" title="绿色"></div>
    <div class="swatch" data-color="#b91d1d" style="background:#b91d1d" title="深红"></div>
    <div class="swatch" data-color="#f1c40f" style="background:#f1c40f" title="黄色"></div>
  </div>
  <div class="color-row" style="margin-top:4px">
    <div class="swatch" data-color="#e67e22" style="background:#e67e22" title="橙色"></div>
    <div class="swatch" data-color="#e84393" style="background:#e84393" title="粉色"></div>
    <div class="swatch" data-color="#0984e3" style="background:#0984e3" title="蓝色"></div>
    <div class="swatch" data-color="#00b894" style="background:#00b894" title="青绿"></div>
    <div class="swatch active" data-color="#6c5ce7" style="background:#6c5ce7" title="靛蓝"></div>
    <div class="swatch" data-color="#d63031" style="background:#d63031" title="珊瑚"></div>
    <div class="swatch" data-color="#00cec9" style="background:#00cec9" title="薄荷"></div>
  </div>

  <div class="picker-label">图标</div>
  <div class="icon-row">
    <div class="icon-opt dot-symbol active" data-icon="dot" title="圆点">●</div>
    <div class="icon-opt" data-icon="🚩" title="旗帜">🚩</div>
    <div class="icon-opt" data-icon="🔺" title="三角">🔺</div>
    <div class="icon-opt" data-icon="✅" title="对勾">✅</div>
    <div class="icon-opt" data-icon="🏆" title="奖杯">🏆</div>
    <div class="icon-opt" data-icon="🏅" title="奖牌">🏅</div>
    <div class="icon-opt" data-icon="🌟" title="星芒">🌟</div>
    <div class="icon-opt" data-icon="⭐️" title="星星">⭐️</div>
    <div class="icon-opt" data-icon="♥️" title="爱心">♥️</div>
  </div>

  <div class="row">
    <button class="btn-mark" id="btnMark">标记</button>
    <button class="btn-clear" id="btnClear">清空</button>
    <button class="btn-reset" id="btnReset">重置</button>
  </div>

  <div class="status" id="status"></div>
  <div class="hint">中/英文皆可 · 支持 ~100 国家</div>
</div>

<div class="watermark">WORLD MAP<br><span class="credit">by linfeng365</span></div>

function lookup(name) {
  const key = name.trim().toLowerCase();
  const hit = DB[key] || DB[name.trim()];
  if (hit) return hit;
  const compact = key.replace(/\s+/g, '');
  for (const [k, v] of Object.entries(DB)) {
    if (k.toLowerCase().replace(/\s+/g, '') === compact) return v;
  }
  return null;
}

  map.getContainer().style.transition = 'opacity 0.8s ease';

// ─── marker management ───
let allMarkers = [];

function makeIcon(color, icon) {
  if (icon === 'dot') {
    const svg = `<svg width="14" height="14" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
      <circle cx="7" cy="7" r="5" fill="${color}" stroke="#fff" stroke-width="2"/>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [14, 14], iconAnchor: [7, 7] });
  }
  // emoji icon
  const html = `<div style="
    font-size:20px;line-height:1;text-align:center;
    transform:translate(-50%,-50%);
    pointer-events:none;
  ">${icon}</div>`;
  return L.divIcon({ html, className: '', iconSize: [24, 24], iconAnchor: [12, 12] });
}

function addMarkerToMap(lat, lng, name, color, icon) {
  const iconObj = makeIcon(color, icon);
  const m = L.marker([lat, lng], { icon: iconObj }).addTo(map);
  const t = L.circleMarker([lat, lng], { radius: 0, opacity: 0 })
    .bindTooltip(name, { permanent: true, direction: 'right', offset: [8, 0], className: 'country-label' })
    .addTo(map);
  allMarkers.push({ marker: m, tooltip: t });
}

function clearAllMarkers() {
  allMarkers.forEach(({ marker, tooltip }) => {
    map.removeLayer(marker);
    map.removeLayer(tooltip);
  });
  allMarkers = [];
}

// ─── mark from input ───
function markFromInput(raw) {
  const names = raw.split(/[,，;；\n\r]+/).map(s => s.trim()).filter(Boolean);
  if (!names.length) { showStatus('请输入地区名', 'error'); return; }

  let added = 0, notFound = [];
  names.forEach(n => {
    const coord = lookup(n);
    if (coord) {
      addMarkerToMap(coord[0], coord[1], n, activeColor, activeIcon);
      added++;
    } else {
      notFound.push(n);
    }
  });

  const parts = [];
  if (added) parts.push(`已标记 ${added} 个`);
  if (notFound.length) parts.push(`未找到: ${notFound.join(', ')}`);
  showStatus(parts.join(' | '), notFound.length ? 'error' : 'ok');
  if (added) document.getElementById('input').value = '';
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
  setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 4000);
}

// ─── ui ───
let resetState = 0;

document.getElementById('btnMark').addEventListener('click', () => {
  resetState = 0;
  markFromInput(document.getElementById('input').value);
});
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    resetState = 0;
    markFromInput(e.target.value);
  }
});
document.getElementById('btnClear').addEventListener('click', () => {
  resetState = 0;
  clearAllMarkers();
  showStatus('已清空所有标记', 'info');
});
document.getElementById('btnReset').addEventListener('click', () => {
  clearAllMarkers();
  if (resetState === 0) {
    defaults.forEach(c => addMarkerToMap(c.lat, c.lng, c.name, c.color, c.icon));
    resetState = 1;
    showStatus('已重置为默认标记', 'ok');
  } else if (resetState === 1) {
    const sh = defaults.find(c => c.name === '上海市');
    if (sh) addMarkerToMap(sh.lat, sh.lng, sh.name, sh.color, sh.icon);
    resetState = 2;
    showStatus('✨ 只保留上海市', 'ok');
  } else {
    origDefaults.forEach(c => addMarkerToMap(c.lat, c.lng, c.name, c.color, c.icon));
    resetState = 0;
    showStatus('🎨 恢复原始配色', 'ok');
  }
});
